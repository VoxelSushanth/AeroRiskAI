version: '3.8'

services:
  # =====================
  # Core Services (Development)
  # =====================
  
  redis:
    image: redis:7-alpine
    container_name: aerorisk-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    command: redis-server --appendonly yes --loglevel debug
    networks:
      - aerorisk-network-dev

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.26
    container_name: aerorisk-redpanda-dev
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - 9092:9092
      - 29092:29092
    volumes:
      - redpanda_data_dev:/var/lib/redpanda/data
    networks:
      - aerorisk-network-dev

  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: aerorisk-qdrant-dev
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data_dev:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - aerorisk-network-dev

  postgres:
    image: postgres:15-alpine
    container_name: aerorisk-postgres-dev
    environment:
      POSTGRES_USER: aerorisk
      POSTGRES_PASSWORD: aerorisk_password
      POSTGRES_DB: aerorisk_incidents
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - aerorisk-network-dev

  # =====================
  # Development Tools
  # =====================

  # Local LLM Server (Ollama)
  ollama:
    image: ollama/ollama:latest
    container_name: aerorisk-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Comment out gpu section if no GPU available
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    networks:
      - aerorisk-network-dev

  # =====================
  # Observability (Development)
  # =====================

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: aerorisk-prometheus-dev
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-lifecycle'
    networks:
      - aerorisk-network-dev

  grafana:
    image: grafana/grafana:10.1.0
    container_name: aerorisk-grafana-dev
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana_data_dev:/var/lib/grafana
    networks:
      - aerorisk-network-dev

  jaeger:
    image: jaegertracing/all-in-one:1.49.0
    container_name: aerorisk-jaeger-dev
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - aerorisk-network-dev

networks:
  aerorisk-network-dev:
    driver: bridge

volumes:
  redis_data_dev:
  redpanda_data_dev:
  qdrant_data_dev:
  postgres_data_dev:
  ollama_data:
  grafana_data_dev:

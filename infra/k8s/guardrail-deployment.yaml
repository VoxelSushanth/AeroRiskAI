apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardrail-deployment
  namespace: aerorisk-ai
  labels:
    app: guardrail
    component: ai-guardrail
spec:
  replicas: 2
  selector:
    matchLabels:
      app: guardrail
  template:
    metadata:
      labels:
        app: guardrail
        component: ai-guardrail
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - guardrail
                topologyKey: kubernetes.io/hostname
      containers:
        - name: guardrail
          image: aerorisk-ai/guardrail:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 8000
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: guardrail-config
                  key: redis_host
            - name: QDRANT_HOST
              valueFrom:
                configMapKeyRef:
                  name: guardrail-config
                  key: qdrant_host
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: guardrail-config
                  key: postgres_host
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: guardrail-config
                  key: kafka_brokers
            - name: LLM_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: guardrail-secrets
                  key: llm_base_url
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger-collector:4317"
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/aerorisk
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: guardrail-config
---
apiVersion: v1
kind: Service
metadata:
  name: guardrail-service
  namespace: aerorisk-ai
  labels:
    app: guardrail
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
    - name: metrics
      port: 9091
      targetPort: 8000
      protocol: TCP
  selector:
    app: guardrail
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: guardrail-hpa
  namespace: aerorisk-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: guardrail-deployment
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Pods
      pods:
        metric:
          name: ai_pipeline_latency_seconds
        target:
          type: AverageValue
          averageValue: "0.2"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: engine-deployment
  namespace: aerorisk-ai
  labels:
    app: engine
    component: matching-engine
spec:
  replicas: 3
  selector:
    matchLabels:
      app: engine
  template:
    metadata:
      labels:
        app: engine
        component: matching-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - engine
                topologyKey: kubernetes.io/hostname
      containers:
        - name: engine
          image: aerorisk-ai/engine:latest
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 9090
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: engine-config
                  key: redis_host
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: engine-config
                  key: kafka_brokers
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger-collector:4317"
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/aerorisk
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: engine-config
---
apiVersion: v1
kind: Service
metadata:
  name: engine-service
  namespace: aerorisk-ai
  labels:
    app: engine
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 9090
      targetPort: 9090
      protocol: TCP
    - name: metrics
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: engine
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: engine-hpa
  namespace: aerorisk-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: engine-deployment
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Pods
      pods:
        metric:
          name: matching_engine_latency_seconds
        target:
          type: AverageValue
          averageValue: "0.001"

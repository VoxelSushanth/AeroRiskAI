apiVersion: v1
kind: Namespace
metadata:
  name: aerorisk-ai
  labels:
    name: aerorisk-ai
    environment: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: aerorisk-quota
  namespace: aerorisk-ai
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    pods: "50"
    persistentvolumeclaims: "10"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: aerorisk-ai
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: aerorisk-ai
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: aerorisk-ai

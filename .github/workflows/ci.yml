name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.21"
  PYTHON_VERSION: "3.11"

jobs:
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      
      - name: Install linters
        run: go install golang.org/x/lint/golint@latest
      
      - name: Run linters
        working-directory: ./engine
        run: |
          golint ./...
          go vet ./...
  
  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    needs: go-lint
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      kafka:
        image: apache/kafka:latest
        ports:
          - 9092:9092
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      
      - name: Run tests
        working-directory: ./engine
        run: go test -race -coverprofile=coverage.out ./...
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./engine/coverage.out
          flags: engine
  
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Poetry
        run: pip install poetry
      
      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-poetry-
      
      - name: Install dependencies
        working-directory: ./ai_guardrail
        run: poetry install --no-interaction
      
      - name: Run linters
        working-directory: ./ai_guardrail
        run: |
          poetry run black --check aerorisk/
          poetry run flake8 aerorisk/
          poetry run mypy aerorisk/
  
  python-test:
    name: Python Test
    runs-on: ubuntu-latest
    needs: python-lint
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      kafka:
        image: apache/kafka:latest
        ports:
          - 9092:9092
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aerorisk
          POSTGRES_PASSWORD: aerorisk
          POSTGRES_DB: aerorisk
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Poetry
        run: pip install poetry
      
      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-poetry-
      
      - name: Install dependencies
        working-directory: ./ai_guardrail
        run: poetry install --no-interaction
      
      - name: Run tests
        working-directory: ./ai_guardrail
        run: poetry run pytest -v --cov=aerorisk --cov-report=xml
  
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./ai_guardrail/coverage.xml
          flags: ai_guardrail
  
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [go-test, python-test]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Engine Docker image
        run: docker build -f infra/docker/engine.Dockerfile -t aerorisk-engine:test ./engine
      
      - name: Build AI Guardrail Docker image
        run: docker build -f infra/docker/ai_guardrail.Dockerfile -t aerorisk-ai-guardrail:test ./ai_guardrail
  
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
